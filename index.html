<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Canvas Move</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
}
canvas{
display:block;
}
</style>

</head>

<body>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const img = new Image();
img.src = "anpanman.jpg";  // 同じフォルダの画像

const size = 380;

let x = canvas.width/2 - size/2;
let y = canvas.height/2 - size/2;

let vx = 0;
let vy = 0;

let visible = false;
let moving = false;

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

if(visible){
ctx.drawImage(img,x,y,size,size);
}

}

canvas.addEventListener("click",(e)=>{

if(!visible){

visible = true;
startMove();
return;

}

const rect = canvas.getBoundingClientRect();
const mx = e.clientX - rect.left;
const my = e.clientY - rect.top;

if(mx > x && mx < x+size && my > y && my < y+size){

startMove();

}

});

function startMove(){

if(moving) return;

moving = true;

vx = (Math.random()*4)+1;
vy = (Math.random()*4)+1;

if(Math.random()<0.5) vx *= -1;
if(Math.random()<0.5) vy *= -1;

const start = Date.now();

function animate(){

let now = Date.now();

if(now - start > 5000){
moving = false;
return;
}

x += vx;
y += vy;

if(x < 0){
x = 0;
vx *= -1;
}

if(x + size > canvas.width){
x = canvas.width - size;
vx *= -1;
}

if(y < 0){
y = 0;
vy *= -1;
}

if(y + size > canvas.height){
y = canvas.height - size;
vy *= -1;
}

draw();

requestAnimationFrame(animate);

}

animate();

}

img.onload = draw;

</script>

</body>
</html>
