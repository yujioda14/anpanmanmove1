<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Canvas Character</title>

<style>
body{
 margin:0;
 background:black;
 overflow:hidden;
}
canvas{
 display:block;
}
</style>

</head>
<body>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const img = new Image();
img.src = "anpanman.jpg";

const size = 380; // 約10cm

let x = canvas.width/2 - size/2;
let y = canvas.height/2 - size/2;

let vx = 0;
let vy = 0;

let stage = 0;
let moving = false;

function draw(){

 ctx.clearRect(0,0,canvas.width,canvas.height);

 if(stage >= 1){
  ctx.drawImage(img,x,y,size,size);
 }

}

canvas.addEventListener("click",(e)=>{

 if(stage === 0){

  stage = 1;
  draw();
  return;

 }

 if(stage === 1){

  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  if(mx > x && mx < x+size && my > y && my < y+size){

   startMove();

  }

 }

});

function startMove(){

 if(moving) return;

 moving = true;

 vx = (Math.random()*10)-5;
 vy = (Math.random()*10)-5;

 const start = Date.now();

 function animate(){

  let now = Date.now();

  if(now - start > 5000){
   moving = false;
   return;
  }

  x += vx;
  y += vy;

  // 壁反射
  if(x < 0 || x + size > canvas.width){
   vx *= -1;
  }

  if(y < 0 || y + size > canvas.height){
   vy *= -1;
  }

  draw();

  requestAnimationFrame(animate);

 }

 animate();

}

img.onload = draw;

</script>

</body>
</html>
